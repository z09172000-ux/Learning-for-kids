<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>每日單字冒險 🌍</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f4;
    --bg3: #efefed;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #a0a09c;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --green: #1d9e75;
    --green-bg: #e1f5ee;
    --green-dark: #085041;
    --green-mid: #0f6e56;
    --orange: #d85a30;
    --orange-bg: #faece7;
    --orange-dark: #4a1b0c;
    --blue: #185fa5;
    --blue-bg: #e6f1fb;
    --blue-dark: #042c53;
    --radius-md: 8px;
    --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #262624;
      --bg3: #2e2e2c;
      --text: #f0f0ee;
      --text2: #a0a09c;
      --text3: #6b6b67;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --green-bg: #0a3328;
      --green-dark: #9fe1cb;
      --orange-bg: #3d1a0e;
      --orange-dark: #f5c4b3;
      --blue-bg: #0c2440;
      --blue-dark: #b5d4f4;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; padding: 16px 14px 32px; }
  .hdr { text-align: center; margin-bottom: 14px; }
  .hdr-title { font-size: 22px; font-weight: 900; color: var(--text); }
  .hdr-sub { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .mascot-row { display: flex; align-items: center; gap: 10px; background: var(--bg2); border-radius: var(--radius-lg); padding: 11px 14px; margin-bottom: 14px; border: 0.5px solid var(--border); }
  .mascot-msg { font-size: 13px; color: var(--text); line-height: 1.55; flex: 1; }
  .mascot-msg b { font-weight: 900; color: var(--green); }
  .day-strip { display: flex; gap: 5px; justify-content: center; margin-bottom: 12px; flex-wrap: wrap; }
  .dd { width: 40px; height: 40px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; cursor: pointer; border: 2px solid transparent; transition: transform 0.12s; user-select: none; }
  .dd:active { transform: scale(0.88); }
  .dd.done { background: var(--green); color: var(--green-bg); border-color: var(--green-mid); }
  .dd.active { background: var(--orange); color: var(--orange-bg); border-color: #993c1d; box-shadow: 0 0 0 3px rgba(216,90,48,0.22); }
  .dd.locked { background: var(--bg2); color: var(--text3); border-color: var(--border); }
  .dd .dn { font-size: 14px; line-height: 1; }
  .dd .ds { font-size: 10px; line-height: 1; }
  .day-title { text-align: center; font-size: 15px; font-weight: 900; color: var(--text); margin-bottom: 10px; }
  .tab-bar { display: flex; gap: 5px; margin-bottom: 12px; }
  .tab { flex: 1; padding: 9px 2px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--bg2); font-size: 12px; font-weight: 800; cursor: pointer; text-align: center; color: var(--text2); font-family: 'Nunito', sans-serif; transition: background 0.1s; }
  .tab.active { background: var(--orange); border-color: #993c1d; color: #faece7; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px; margin-bottom: 10px; }
  .slbl { font-size: 10px; font-weight: 900; color: var(--text2); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 7px; }
  .prog-wrap { background: var(--bg2); border-radius: 99px; height: 8px; margin-bottom: 4px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 99px; background: var(--green); transition: width 0.4s; }
  .prog-txt { font-size: 11px; color: var(--text2); text-align: right; margin-bottom: 10px; }
  .star-row { display: flex; gap: 4px; justify-content: center; margin: 8px 0 12px; }
  .star-i { font-size: 18px; opacity: 0.2; transition: opacity 0.3s, transform 0.25s; }
  .star-i.lit { opacity: 1; transform: scale(1.2); }
  .word-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; transition: transform 0.1s; }
  .word-card:active { transform: scale(0.97); }
  .word-card.learned { border-color: var(--green); background: var(--green-bg); }
  .word-em { font-size: 28px; width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; border-radius: 10px; background: var(--bg2); flex-shrink: 0; cursor: pointer; }
  .word-card.learned .word-em { background: rgba(29,158,117,0.15); }
  .word-info { flex: 1; min-width: 0; }
  .word-en { font-size: 17px; font-weight: 900; color: var(--text); line-height: 1.1; }
  .word-zh { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .word-ph { font-size: 11px; color: var(--text3); margin-top: 1px; font-family: monospace; }
  .spk { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border2); background: var(--bg2); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  .chk { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
  .chk.on { background: var(--green); border-color: var(--green-mid); }
  .done-banner { background: var(--green); color: var(--green-bg); border-radius: var(--radius-lg); padding: 12px; text-align: center; margin-top: 10px; font-size: 14px; font-weight: 900; display: none; }
  .done-banner.show { display: block; }
  .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .mc { background: var(--bg); border: 2px solid var(--border2); border-radius: 12px; padding: 10px 6px; text-align: center; cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 800; color: var(--text); transition: transform 0.1s, background 0.12s; min-height: 58px; display: flex; align-items: center; justify-content: center; line-height: 1.3; user-select: none; }
  .mc:active { transform: scale(0.93); }
  .mc.sel { background: var(--blue-bg); border-color: var(--blue); color: var(--blue-dark); }
  .mc.matched { background: var(--green-bg); border-color: var(--green); color: var(--green-dark); cursor: default; opacity: 0.65; }
  .mc.wrong { background: var(--orange-bg); border-color: var(--orange); color: var(--orange-dark); }
  .match-score { font-size: 12px; color: var(--text2); text-align: center; margin-bottom: 8px; }
  .match-ok { background: var(--green); color: var(--green-bg); border-radius: var(--radius-lg); padding: 12px; text-align: center; font-size: 14px; font-weight: 900; margin-bottom: 8px; display: none; }
  .match-ok.show { display: block; }
  .gbtn { width: 100%; padding: 13px; border-radius: var(--radius-lg); font-size: 15px; font-weight: 900; border: none; cursor: pointer; font-family: 'Nunito', sans-serif; transition: transform 0.1s; margin-top: 6px; }
  .gbtn:active { transform: scale(0.97); }
  .gbtn.green { background: var(--green); color: var(--green-bg); }
  .gbtn.orange { background: var(--orange); color: var(--orange-bg); }
  .gbtn.blue { background: var(--blue); color: var(--blue-bg); }
  .quiz-wrap { background: var(--bg2); border-radius: 16px; padding: 16px; margin-bottom: 10px; }
  .qprompt { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
  .qem { font-size: 46px; margin-bottom: 6px; }
  .qword { font-size: 34px; font-weight: 900; color: var(--text); margin-bottom: 14px; line-height: 1.1; }
  .qchoices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .qc { padding: 11px 6px; border-radius: 11px; border: 2px solid var(--border2); background: var(--bg); font-size: 14px; font-weight: 800; cursor: pointer; font-family: 'Nunito', sans-serif; color: var(--text); transition: background 0.1s; }
  .qc.correct { background: var(--green-bg); border-color: var(--green); color: var(--green-dark); }
  .qc.wrong { background: var(--orange-bg); border-color: var(--orange); color: var(--orange-dark); }
  .qdots { display: flex; gap: 6px; justify-content: center; margin-bottom: 10px; }
  .qdot { width: 17px; height: 17px; border-radius: 50%; background: var(--border2); }
  .qdot.ok { background: var(--green); }
  .qdot.no { background: var(--orange); }
  .qnext { width: 100%; padding: 11px; border-radius: 11px; background: var(--blue); color: var(--blue-bg); font-size: 14px; font-weight: 900; border: none; cursor: pointer; font-family: 'Nunito', sans-serif; display: none; }
  .qresult { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 8px; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-title">🌍 每日單字冒險</div>
    <div class="hdr-sub">每天7個單字・7天完成挑戰！</div>
  </div>

  <div class="mascot-row">
    <div style="font-size:38px;line-height:1">🦉</div>
    <div class="mascot-msg" id="mascotMsg">嗨！我是奧利 Ollie！<br>今天要學什麼呢？一起出發吧！</div>
  </div>

  <div class="day-strip" id="dayStrip"></div>
  <div class="day-title" id="dayTitle"></div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab(0)" id="tb0">📚 學單字</button>
    <button class="tab" onclick="switchTab(1)" id="tb1">🃏 配對</button>
    <button class="tab" onclick="switchTab(2)" id="tb2">🎯 測驗</button>
  </div>

  <!-- 學單字 -->
  <div id="tab0">
    <div class="slbl">今天進度</div>
    <div class="prog-wrap"><div class="prog-fill" id="progBar" style="width:0%"></div></div>
    <div class="prog-txt" id="progTxt">0 / 7 個</div>
    <div class="star-row" id="starRow"></div>
    <div class="slbl" style="margin-top:2px">點 emoji 聽發音・打勾代表學會了！</div>
    <div id="wordList"></div>
    <div class="done-banner" id="doneBanner">🎉 太棒了！今天全部學完！奧利好開心！</div>
  </div>

  <!-- 配對遊戲 -->
  <div id="tab1" class="hidden">
    <div class="slbl">把英文單字和圖片配對！</div>
    <div class="match-score" id="matchScore">找到 0 / 7 對</div>
    <div id="matchArea"></div>
    <div class="match-ok" id="matchOk">🏆 全部配對完成！你好厲害！</div>
    <button class="gbtn green" onclick="resetMatch()">🔄 再玩一次</button>
  </div>

  <!-- 問答測驗 -->
  <div id="tab2" class="hidden">
    <div class="qdots" id="qdots"></div>
    <div class="quiz-wrap" id="quizBox">
      <div class="qprompt" id="qprompt"></div>
      <div class="qem" id="qem"></div>
      <div class="qword" id="qword"></div>
      <div class="qchoices" id="qchoices"></div>
      <button class="qnext" id="qnext" onclick="nextQuiz()">下一題 →</button>
    </div>
    <div class="qresult" id="qresult"></div>
    <button class="gbtn blue hidden" onclick="resetQuiz()" id="qresetBtn">🔄 再挑戰一次</button>
  </div>
</div>

<script>
const DAYS = [
  { theme: '🌲 森林動物日', words: [
    {en:'Bear',zh:'熊',ph:'/bɛr/',em:'🐻'},
    {en:'Fox',zh:'狐狸',ph:'/fɒks/',em:'🦊'},
    {en:'Deer',zh:'鹿',ph:'/dɪr/',em:'🦌'},
    {en:'Wolf',zh:'狼',ph:'/wʊlf/',em:'🐺'},
    {en:'Owl',zh:'貓頭鷹',ph:'/aʊl/',em:'🦉'},
    {en:'Rabbit',zh:'兔子',ph:'/ˈræbɪt/',em:'🐰'},
    {en:'Squirrel',zh:'松鼠',ph:'/ˈskwɪrəl/',em:'🐿️'}
  ]},
  { theme: '🍭 美食天地日', words: [
    {en:'Cake',zh:'蛋糕',ph:'/keɪk/',em:'🎂'},
    {en:'Milk',zh:'牛奶',ph:'/mɪlk/',em:'🥛'},
    {en:'Rice',zh:'米飯',ph:'/raɪs/',em:'🍚'},
    {en:'Bread',zh:'麵包',ph:'/brɛd/',em:'🍞'},
    {en:'Noodle',zh:'麵條',ph:'/ˈnuːdəl/',em:'🍜'},
    {en:'Cookie',zh:'餅乾',ph:'/ˈkʊki/',em:'🍪'},
    {en:'Juice',zh:'果汁',ph:'/dʒuːs/',em:'🧃'}
  ]},
  { theme: '🚀 交通工具日', words: [
    {en:'Car',zh:'汽車',ph:'/kɑːr/',em:'🚗'},
    {en:'Bus',zh:'公車',ph:'/bʌs/',em:'🚌'},
    {en:'Boat',zh:'船',ph:'/boʊt/',em:'⛵'},
    {en:'Plane',zh:'飛機',ph:'/pleɪn/',em:'✈️'},
    {en:'Train',zh:'火車',ph:'/treɪn/',em:'🚂'},
    {en:'Bike',zh:'腳踏車',ph:'/baɪk/',em:'🚲'},
    {en:'Rocket',zh:'火箭',ph:'/ˈrɒkɪt/',em:'🚀'}
  ]},
  { theme: '🎨 繽紛色彩日', words: [
    {en:'Red',zh:'紅色',ph:'/rɛd/',em:'🔴'},
    {en:'Blue',zh:'藍色',ph:'/bluː/',em:'🔵'},
    {en:'Green',zh:'綠色',ph:'/ɡriːn/',em:'🟢'},
    {en:'Yellow',zh:'黃色',ph:'/ˈjɛloʊ/',em:'🟡'},
    {en:'Pink',zh:'粉紅色',ph:'/pɪŋk/',em:'🩷'},
    {en:'Orange',zh:'橘色',ph:'/ˈɔːrɪndʒ/',em:'🟠'},
    {en:'Purple',zh:'紫色',ph:'/ˈpɜːrpəl/',em:'🟣'}
  ]},
  { theme: '💭 心情感受日', words: [
    {en:'Happy',zh:'開心',ph:'/ˈhæpi/',em:'😊'},
    {en:'Sad',zh:'難過',ph:'/sæd/',em:'😢'},
    {en:'Big',zh:'大的',ph:'/bɪɡ/',em:'🐘'},
    {en:'Small',zh:'小的',ph:'/smɔːl/',em:'🐭'},
    {en:'Hot',zh:'熱的',ph:'/hɒt/',em:'🔥'},
    {en:'Cold',zh:'冷的',ph:'/koʊld/',em:'🧊'},
    {en:'Fast',zh:'快的',ph:'/fæst/',em:'⚡'}
  ]},
  { theme: '🤸 身體部位日', words: [
    {en:'Head',zh:'頭',ph:'/hɛd/',em:'🗣️'},
    {en:'Eye',zh:'眼睛',ph:'/aɪ/',em:'👁️'},
    {en:'Mouth',zh:'嘴巴',ph:'/maʊθ/',em:'👄'},
    {en:'Hand',zh:'手',ph:'/hænd/',em:'✋'},
    {en:'Foot',zh:'腳',ph:'/fʊt/',em:'🦶'},
    {en:'Ear',zh:'耳朵',ph:'/ɪr/',em:'👂'},
    {en:'Nose',zh:'鼻子',ph:'/noʊz/',em:'👃'}
  ]},
  { theme: '🌿 大自然日', words: [
    {en:'Water',zh:'水',ph:'/ˈwɔːtər/',em:'💧'},
    {en:'Flower',zh:'花',ph:'/ˈflaʊər/',em:'🌸'},
    {en:'Sky',zh:'天空',ph:'/skaɪ/',em:'🌤️'},
    {en:'Rain',zh:'雨',ph:'/reɪn/',em:'🌧️'},
    {en:'Star',zh:'星星',ph:'/stɑːr/',em:'⭐'},
    {en:'House',zh:'房子',ph:'/haʊs/',em:'🏠'},
    {en:'Heart',zh:'心',ph:'/hɑːrt/',em:'❤️'}
  ]}
];

const MASCOT = [
  '嗨！我是奧利 Ollie！<br>今天要學什麼呢？一起出發吧！',
  '好棒！繼續學吧！🌳',
  '你真厲害！已經一半了！🌟',
  '快完成了！再幾個就好！✨',
  '哇！全部學完啦！<br>奧利超以你為榮！🏆'
];

let curDay = 0;
let learned = DAYS.map(() => new Array(7).fill(false));
let matchSt = {}, quizSt = {}, curTab = 0;

function speak(w) {
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(w);
    u.lang = 'en-US'; u.rate = 0.75;
    speechSynthesis.speak(u);
  }
}

function lc(d) { return learned[d].filter(Boolean).length; }

function renderDayStrip() {
  const strip = document.getElementById('dayStrip');
  strip.innerHTML = '';
  DAYS.forEach((_, i) => {
    const done = lc(i) === 7, active = i === curDay;
    const d = document.createElement('div');
    d.className = 'dd ' + (done ? 'done' : active ? 'active' : 'locked');
    d.innerHTML = `<span class="dn">${i+1}</span><span class="ds">${done ? '✓' : active ? '▶' : '🔒'}</span>`;
    d.onclick = () => setDay(i);
    strip.appendChild(d);
  });
  document.getElementById('dayTitle').textContent = DAYS[curDay].theme;
}

function setDay(i) {
  curDay = i; matchSt = {}; quizSt = {};
  renderDayStrip(); switchTab(curTab, true);
}

function renderWords() {
  const d = curDay, c = lc(d), W = DAYS[d].words;
  document.getElementById('progBar').style.width = (c / 7 * 100) + '%';
  document.getElementById('progTxt').textContent = c + ' / 7 個';
  const mi = c === 0 ? 0 : c <= 2 ? 1 : c <= 4 ? 2 : c <= 6 ? 3 : 4;
  document.getElementById('mascotMsg').innerHTML = MASCOT[mi];
  const sr = document.getElementById('starRow');
  sr.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const s = document.createElement('span');
    s.className = 'star-i' + (i < c ? ' lit' : '');
    s.textContent = '⭐'; sr.appendChild(s);
  }
  const list = document.getElementById('wordList');
  list.innerHTML = '';
  W.forEach((w, i) => {
    const lrn = learned[d][i];
    const el = document.createElement('div');
    el.className = 'word-card' + (lrn ? ' learned' : '');
    el.innerHTML = `
      <div class="word-em" onclick="speak('${w.en}')">${w.em}</div>
      <div class="word-info">
        <div class="word-en">${w.en}</div>
        <div class="word-zh">${w.zh}</div>
        <div class="word-ph">${w.ph}</div>
      </div>
      <div class="spk" onclick="speak('${w.en}')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text2)"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      </div>
      <div class="chk${lrn ? ' on' : ''}" onclick="toggle(${i})">
        ${lrn ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#e1f5ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
      </div>`;
    list.appendChild(el);
  });
  document.getElementById('doneBanner').className = 'done-banner' + (c === 7 ? ' show' : '');
}

function toggle(i) { learned[curDay][i] = !learned[curDay][i]; renderDayStrip(); renderWords(); }

function switchTab(t, force) {
  if (t === curTab && !force) return;
  curTab = t;
  [0, 1, 2].forEach(i => {
    const el = document.getElementById('tab' + i);
    el.className = i === t ? '' : 'hidden';
    document.getElementById('tb' + i).className = 'tab' + (i === t ? ' active' : '');
  });
  if (t === 0) renderWords();
  if (t === 1) { if (!matchSt.init) initMatch(); else renderMatch(); }
  if (t === 2) { if (!quizSt.init) initQuiz(); else renderQuiz(); }
}

function initMatch() {
  const W = DAYS[curDay].words;
  const emojis = W.map((w, i) => ({ id: 'em' + i, val: w.em, idx: i, type: 'em' }));
  const words = W.map((w, i) => ({ id: 'wd' + i, val: w.en, idx: i, type: 'wd' }));
  matchSt = { init: true, matched: new Set(), sel: null, pairs: [...emojis, ...words].sort(() => Math.random() - 0.5) };
  renderMatch();
}

function renderMatch() {
  const c = matchSt.matched.size / 2;
  document.getElementById('matchScore').textContent = '找到 ' + Math.round(c) + ' / 7 對';
  const area = document.getElementById('matchArea');
  area.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'match-grid';
  matchSt.pairs.forEach(p => {
    const isM = matchSt.matched.has(p.id), isS = matchSt.sel && matchSt.sel.id === p.id;
    const card = document.createElement('div');
    card.className = 'mc' + (isM ? ' matched' : isS ? ' sel' : '');
    card.style.fontSize = p.type === 'em' ? '28px' : '14px';
    card.textContent = p.val;
    if (!isM) card.onclick = () => selectMatch(p);
    grid.appendChild(card);
  });
  area.appendChild(grid);
  document.getElementById('matchOk').className = 'match-ok' + (matchSt.matched.size === 14 ? ' show' : '');
}

function selectMatch(p) {
  if (matchSt.matched.has(p.id)) return;
  if (!matchSt.sel) { matchSt.sel = p; renderMatch(); return; }
  const prev = matchSt.sel; matchSt.sel = null;
  if (prev.id === p.id) return;
  if (prev.idx === p.idx && prev.type !== p.type) {
    matchSt.matched.add(prev.id); matchSt.matched.add(p.id);
    speak(DAYS[curDay].words[p.idx].en); renderMatch();
  } else {
    const vals = [prev.val, p.val];
    document.querySelectorAll('.mc').forEach(c => { if (vals.includes(c.textContent)) c.className = 'mc wrong'; });
    setTimeout(renderMatch, 700);
  }
}

function resetMatch() { matchSt = {}; initMatch(); }

function initQuiz() {
  const pool = [...Array(7).keys()].sort(() => Math.random() - 0.5);
  quizSt = { init: true, pool, cur: 0, answers: [], done: false };
  renderQuiz();
}

function renderQuiz() {
  const qs = quizSt, W = DAYS[curDay].words;
  const dots = document.getElementById('qdots');
  dots.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = document.createElement('div');
    d.className = 'qdot' + (i < qs.answers.length ? (qs.answers[i] ? ' ok' : ' no') : '');
    dots.appendChild(d);
  }
  if (qs.done) {
    document.getElementById('quizBox').classList.add('hidden');
    const sc = qs.answers.filter(Boolean).length;
    document.getElementById('qresult').textContent = '完成！答對 ' + sc + ' / 7 題 ' + (sc >= 6 ? '🏆超厲害！' : sc >= 4 ? '👍不錯喔！' : '💪繼續加油！');
    document.getElementById('qresetBtn').classList.remove('hidden');
    return;
  }
  document.getElementById('quizBox').classList.remove('hidden');
  document.getElementById('qresetBtn').classList.add('hidden');
  document.getElementById('qresult').textContent = '';
  const wi = qs.pool[qs.cur], w = W[wi];
  document.getElementById('qem').textContent = w.em;
  document.getElementById('qword').textContent = w.en;
  document.getElementById('qprompt').textContent = '這個單字的意思是？（第 ' + (qs.cur + 1) + ' 題）';
  const others = W.filter((_, i) => i !== wi).sort(() => Math.random() - 0.5).slice(0, 3);
  const choices = [...others, w].sort(() => Math.random() - 0.5);
  const ch = document.getElementById('qchoices');
  ch.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'qc'; btn.textContent = c.zh;
    btn.onclick = () => answerQuiz(c.en === w.en, btn, wi);
    ch.appendChild(btn);
  });
  document.getElementById('qnext').style.display = 'none';
}

function answerQuiz(correct, btn, wi) {
  document.querySelectorAll('.qc').forEach(b => b.onclick = null);
  quizSt.answers.push(correct);
  if (correct) { btn.className = 'qc correct'; speak(DAYS[curDay].words[wi].en); }
  else { btn.className = 'qc wrong'; document.querySelectorAll('.qc').forEach(b => { if (b.textContent === DAYS[curDay].words[wi].zh) b.className = 'qc correct'; }); }
  const nxt = document.getElementById('qnext');
  nxt.style.display = 'block';
  nxt.textContent = quizSt.cur < 6 ? '下一題 →' : '看結果 🎉';
}

function nextQuiz() { quizSt.cur++; if (quizSt.cur >= 7) quizSt.done = true; renderQuiz(); }
function resetQuiz() { quizSt = {}; initQuiz(); }

renderDayStrip();
renderWords();
</script>
